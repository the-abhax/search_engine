<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ABHI Search</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="background"></div>

    <header>
        <div class="logo">ABHI Search</div>
    </header>

    <main>

        <h1>Find Anything.</h1>

        <p class="subtitle">
            Fast, simple and beautiful search.
        </p>

        <form
            action="https://www.google.com/search"
            method="GET"
            target="_blank"
            class="search-box"
        >

            <span class="search-icon">🔍</span>

            <input
                type="text"
                name="q"
                placeholder="Search the web..."
                required
            >

            <button type="submit">
                Search
            </button>

        </form>

        <div class="categories">

            <a href="https://www.google.com/search?q=Technology" target="_blank" class="chip">Technology</a>

            <a href="https://www.google.com/search?q=Programming" target="_blank" class="chip">Programming</a>

            <a href="https://www.google.com/search?q=Science" target="_blank" class="chip">Science</a>

            <a href="https://www.google.com/search?q=Space" target="_blank" class="chip">Space</a>

            <a href="https://www.google.com/search?q=Education" target="_blank" class="chip">Education</a>

            <a href="https://www.google.com/search?q=Music" target="_blank" class="chip">Music</a>

        </div>

    </main>

    <footer>
        Built by Abhi
    </footer>

</body>
</html>
